<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>닷링크</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="eyebrow">점 이동하기</p>
      <h1>닷링크</h1>
      <p class="description">
        같은 색 점끼리 선으로 연결하세요. 선은 서로 겹치거나 지나갈 수 없고,
        모든 칸을 채워야 다음 단계로 넘어갈 수 있습니다.
      </p>

      <div class="controls" aria-label="게임 조작">
        <button id="prevBtn" type="button">◀ 이전</button>
        <button id="resetBtn" type="button">🔄 다시 하기</button>
        <button id="nextBtn" type="button">다음 ▶</button>
      </div>

      <p id="levelLabel" class="level-label"></p>
      <p id="message" class="message">같은 색 점끼리 선으로 연결하고 모든 칸을 채우세요.</p>
    </header>

    <section class="board-wrap">
      <section id="board" class="board" aria-label="점 잇기 퍼즐 판"></section>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
